<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夏日記事-實境解謎解答表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet" />

    <style>
      /* --- CSS 變數定義 (Stone 色系) --- */
      :root {
        --stone-50: #fafaf9;
        --stone-100: #f5f5f4;
        --stone-200: #e7e5e4;
        --stone-300: #d6d3d1;
        --stone-400: #a8a29e;
        --stone-500: #78716c;
        --stone-600: #57534e;
        --stone-700: #44403c;
        --stone-800: #292524;
        --stone-900: #1c1917;
        --white: #ffffff;
      }

      /* --- 基礎重置與全域設定 --- */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Noto Sans TC", sans-serif;
        background-color: var(--stone-100);
        color: var(--stone-800);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      /* --- 工具類 (Utilities) --- */
      .serif-title {
        font-family: "Noto Serif TC", serif;
      }

      .font-mono {
        font-family: monospace, monospace; /* 簡單的等寬字體設定 */
      }

      /* --- 主要容器 (A4 模擬) --- */
      .main-container {
        width: 100%;
        max-width: 210mm;
        min-height: 297mm;
        background-color: var(--white);
        margin: 0 auto;
        padding: 2rem;
        position: relative;
      }

      /* --- Header --- */
      .doc-header {
        text-align: center;
        margin-bottom: 2.5rem;
        padding-bottom: 2.5rem;
        border-bottom: 2px solid var(--stone-100);
      }

      .tag-demo {
        display: inline-block;
        padding: 0.25rem 1rem;
        border: 1px solid var(--stone-300);
        border-radius: 9999px;
        font-size: 0.75rem;
        color: var(--stone-500);
        margin-bottom: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .main-title {
        font-size: 3rem;
        font-weight: 700;
        color: var(--stone-900);
        letter-spacing: 0.025em;
        margin-bottom: 1rem;
      }

      .sub-title {
        color: var(--stone-500);
        font-size: 1.125rem;
        font-weight: 300;
        letter-spacing: 0.05em;
      }

      /* --- 章節區塊 --- */
      .chapter-list {
        display: flex;
        flex-direction: column;
        gap: 3rem; /* space-y-12 */
      }

      .chapter {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        break-inside: avoid; /* page-break-inside-avoid */
      }

      .chapter-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 2px solid var(--stone-800);
        padding-bottom: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .chapter-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--stone-900);
      }

      .chapter-number {
        color: var(--stone-600); /* 章節一較深 */
        font-size: 0.875rem;
      }

      /* 其他章節的編號顏色較淡 */
      .chapter:not(:first-child) .chapter-number {
        color: var(--stone-400);
      }
      .chapter:not(:first-child) .chapter-title {
        color: var(--stone-800);
      }

      /* --- 解答卡片 (Answer Card) --- */
      .answer-card {
        background-color: var(--stone-800);
        border-radius: 0.5rem;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1rem;
        position: relative;
        overflow: hidden;
        min-height: 120px;
      }

      /* 裝飾圓圈 */
      .deco-circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.2;
      }
      .deco-circle.top-right {
        width: 10rem;
        height: 10rem;
        background-color: var(--stone-700);
        top: -2.5rem;
        right: -2.5rem;
      }
      .deco-circle.bottom-left {
        width: 8rem;
        height: 8rem;
        background-color: var(--stone-600);
        bottom: -2.5rem;
        left: -2.5rem;
      }

      .answer-label {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--stone-400);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        position: relative;
        z-index: 10;
      }

      .answer-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
        letter-spacing: 0.1em;
        word-break: break-all;
        position: relative;
        z-index: 10;
      }

      .answer-note {
        color: var(--stone-500);
        font-size: 0.875rem;
        margin-top: 0.5rem;
        position: relative;
        z-index: 10;
      }

      /* --- 圖片與網格佈局 (Grid Layout) --- */
      .grid-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .image-container {
        border-radius: 0.5rem;
        overflow: hidden;
        background-color: var(--stone-100);
        border: 1px solid var(--stone-200);
        /* 修改這裡：設定為 1:1 正方形 */
        aspect-ratio: 1 / 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .chapter-image {
        width: 100%;
        height: 100%;
        /* 修改這裡：由 cover 改為 contain，確保圖片不被切掉 */
        object-fit: contain;
        filter: grayscale(20%);
        transition: filter 0.5s;
      }

      .image-container:hover .chapter-image {
        filter: grayscale(0%);
      }

      /* --- Footer --- */
      .doc-footer {
        margin-top: 5rem;
        padding-top: 2rem;
        border-top: 1px solid var(--stone-200);
        text-align: center;
        color: var(--stone-400);
        font-size: 0.875rem;
      }

      /* --- 響應式設計 (Media Queries) --- */
      @media (min-width: 768px) {
        .main-container {
          padding: 4rem; /* md:p-16 */
        }

        .main-title {
          font-size: 3rem; /* md:text-5xl */
        }

        .answer-text {
          font-size: 1.875rem; /* md:text-3xl */
        }

        .grid-layout {
          grid-template-columns: repeat(2, 1fr);
        }

        .col-span-2 {
          grid-column: auto;
        }
      }

      /* --- 列印設定 (Print) --- */
      @media print {
        body {
          background-color: white;
          margin: 0;
          padding: 0;
        }

        .main-container {
          box-shadow: none !important;
          border: none;
          max-width: none;
          width: 100%;
          min-height: auto;
          margin: 0;
          padding: 0 2rem; /* 列印時保留一點邊距 */
        }

        /* 確保背景色列印出來 */
        .answer-card {
          height: 100%; /* 確保在 Grid 佈局中與圖片高度對齊 */
          background-color: var(--stone-800);
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background-color: var(--stone-800) !important;
          color: white !important;
        }

        .deco-circle {
          display: none; /* 列印時隱藏裝飾圓圈以節省墨水或保持清晰 */
        }

        /* 防止分頁切斷內容 */
        .chapter,
        article {
          break-inside: avoid;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="main-container">
      <header class="doc-header">
        <div class="tag-demo">Demo Walkthrough</div>
        <h1 class="main-title serif-title">夏日記事</h1>
        <p class="sub-title">場景與解答導覽</p>
      </header>

      <div class="chapter-list">
        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">謎題・石燈</h2>
            <span class="chapter-number font-mono">Chapter 01</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">122221</div>
            <p class="answer-note"></p>
          </div>
        </article>

        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">謎題・鳥居</h2>
            <span class="chapter-number font-mono">Chapter 02</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">128</div>
            <p class="answer-note"></p>
          </div>
        </article>

        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">謎題・參拜</h2>
            <span class="chapter-number font-mono">Chapter 03</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">416523</div>
            <p class="answer-note"></p>
          </div>
        </article>

        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">謎題・狛犬</h2>
            <span class="chapter-number font-mono">Chapter 04</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">2258</div>
            <p class="answer-note"></p>
          </div>
        </article>

        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">謎題・本殿</h2>
            <span class="chapter-number font-mono">Chapter 05</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">1322231</div>
            <p class="answer-note"></p>
          </div>
        </article>

        <article class="chapter">
          <div class="chapter-header">
            <h2 class="chapter-title serif-title">最終之謎</h2>
            <span class="chapter-number font-mono">Final Chapter</span>
          </div>

          <div class="answer-card">
            <div class="deco-circle top-right"></div>
            <div class="deco-circle bottom-left"></div>

            <span class="answer-label">Answer Key</span>
            <div class="answer-text font-mono">KIMIGASUKIDAYO</div>
            <p class="answer-note"></p>
          </div>
        </article>
      </div>

      <footer class="doc-footer">
        <p>&copy; 2026 夏日記事</p>
      </footer>
    </main>
  </body>
</html>
